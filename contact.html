<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <title>Contact - Sky's Craft Lab</title>
  <style>
    :root {
      --primary-purple: #6a1b9a;
      --secondary-purple: #9c27b0;
      --logo-dark-purple: #4a0072;
      --light-bg: #f3e5f5;
    }
    body { font-family: 'Segoe UI', sans-serif; background-color: var(--light-bg); margin: 0; padding: 0; }
    header { background: linear-gradient(135deg, var(--primary-purple), var(--secondary-purple)); text-align: center; padding: 25px 0; }
    header h1 { margin: 0; color: white; font-family: 'Dancing Script', cursive; font-size: 2.5rem; }
    nav { margin-top: 10px; }
    nav a { color: white; text-decoration: none; margin: 0 10px; font-weight: bold; }
    
    main { max-width: 500px; margin: 20px auto; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    label { display: block; margin-top: 15px; color: var(--primary-purple); font-weight: bold; }
    input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    
    .btn { 
      display: block; width: 100%; margin-top: 20px; padding: 15px; 
      background: var(--logo-dark-purple); color: white; border: none; 
      border-radius: 10px; font-weight: bold; cursor: pointer; text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <h1>Sky's Craft Lab</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="gallery.html">Gallery</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <p style="text-align: center; font-style: italic;">Fill the form below and let's bring it to life inside the lab!</p>
    
    <!-- No action attribute, using local script to trigger email -->
    <form id="contactForm">
      <label>Your Name</label>
      <input type="text" id="userName" required>

      <label>Email Address</label>
      <input type="email" id="userEmail" required>

      <label>What are we creating?</label>
      <select id="serviceType">
        <option>Team Apparel & Custom Jerseys</option>
        <option>Custom Pet Jars & Vinyl Glassware</option>
        <option>Character Fanware & Hoodies</option>
        <option>Custom Decals & Vinyl Stickers</option>
        <option>Custom 3D Printing & Unique Gear</option>
      </select>

      <label>Project Details</label>
      <textarea id="projectDetails" rows="5" required></textarea>

      <button type="button" class="btn" onclick="sendEmail()">Send Inquiry to the Lab</button>
    </form>
  </main>

  <script>
    function sendEmail() {
      const name = document.getElementById('userName').value;
      const email = document.getElementById('userEmail').value;
      const service = document.getElementById('serviceType').value;
      const details = document.getElementById('projectDetails').value;
      
      const mailtoLink = `mailto:skyscraftlab@gmail.com?subject=New Inquiry: ${service}&body=Name: ${name}%0AEmail: ${email}%0A%0AProject Details:%0A${details}`;
      
      window.location.href = mailtoLink;
    }
  </script>

</body>
</html>
