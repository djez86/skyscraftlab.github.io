<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sky's Craft Lab</title>
  <style>
    :root {
      --primary-purple: #6a1b9a;
      --secondary-purple: #9c27b0;
      --accent-pink: #e91e63;
      --light-bg: #f3e5f5;
      --silver-metallic: linear-gradient(180deg, #d1d1d1 0%, #ffffff 50%, #b0b0b0 100%);
      --silver-border: 1px solid #c0c0c0;
    }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: var(--light-bg); color: #333; }
    
    header { background: linear-gradient(135deg, var(--primary-purple), var(--secondary-purple)); text-align: center; padding: 25px 0; }
    header h1, nav a { background: var(--silver-metallic); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
    
    nav { margin-top: 15px; }
    nav a { text-decoration: none; margin: 0 12px; padding: 8px 16px; border: var(--silver-border); border-radius: 20px; }

    main { max-width: 600px; margin: 0 auto; padding: 20px; text-align: center; }
    
    /* ADDED SILVER BORDER TO BOXES */
    .content-box { background: white; border-radius: 15px; padding: 30px; margin-bottom: 25px; border: var(--silver-border); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    
    h2 { color: var(--primary-purple); margin-top: 0; }
    
    /* ADDED SILVER DIVIDER EFFECT */
    .divider { height: 2px; background: var(--silver-metallic); margin: 20px 0; border: none; }

    .product-grid { display: grid; gap: 12px; margin: 20px 0; }
    .product-item { background: #fdf5ff; padding: 15px; border-radius: 8px; border-left: 4px solid var(--accent-pink); font-weight: bold; color: var(--primary-purple); text-align: left; }
    
    .btn { display: inline-block; margin-top: 20px; padding: 12px 30px; background: var(--accent-pink); color: white; text-decoration: none; border-radius: 30px; font-weight: bold; }

    footer { background: #2d2d2d; color: #d1d1d1; text-align: center; padding: 15px; font-size: 0.8rem; }
  </style>
</head>
<body>

  <header>
    <h1>Sky's Craft Lab</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="gallery.html">Gallery</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <div class="content-box">
      <h2>Welcome to the Lab!</h2>
      <p>Handmade creations, custom designs & 3D printed products crafted with creativity and care.</p>
      <a href="https://skyscraftlab.store" class="btn">Visit Our Main Store</a>
    </div>

    <hr class="divider"> <!-- Silver divider added here -->

    <div class="content-box">
      <h2>What We Create</h2>
      <div class="product-grid">
        <div class="product-item">👕 Custom Apparel & Vinyl Design</div>
        <div class="product-item">⚙️ High-Precision 3D Printing</div>
      </div>
    </div>
  </main>

  <footer><p>&copy; 2026 Sky's Craft Lab. All rights reserved.</p></footer>
</body>
</html>
