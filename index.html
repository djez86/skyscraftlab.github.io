<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sky's Craft Lab</title>
  <style>
    :root {
      --deep-purple: #4a148c;
      --soft-purple: #7b1fa2;
      --light-purple: #f3e5f5;
      --accent-gold: #c5a059;
    }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--light-purple); color: #333; }
    
    header { background: var(--deep-purple); color: white; text-align: center; padding: 25px 0; }
    header h1 { margin: 0; font-size: 1.8rem; }
    
    nav { margin-top: 15px; }
    nav a { color: white; margin: 0 10px; text-decoration: none; font-weight: bold; border-bottom: 2px solid transparent; }
    nav a:hover { border-bottom: 2px solid var(--accent-gold); }

    main { max-width: 600px; margin: 0 auto; padding: 20px; text-align: center; }
    
    .brand-section { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 25px; }
    .tagline { font-style: italic; color: var(--soft-purple); font-weight: bold; margin-top: 10px; }
    
    .product-grid { display: grid; gap: 15px; }
    .item { background: white; padding: 15px; border-radius: 8px; border-left: 5px solid var(--soft-purple); text-align: left; font-weight: 500; }
    
    .cta-button { display: inline-block; margin-top: 25px; padding: 15px 30px; background: var(--deep-purple); color: white; text-decoration: none; border-radius: 30px; font-weight: bold; }
  </style>
</head>
<body>

  <header>
    <h1>Sky's Craft Lab</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="gallery.html">Gallery</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <div class="brand-section">
      <h2>Handmade Creations</h2>
      <p>Custom designs & 3D printed products crafted with creativity and care.</p>
      <p class="tagline">✨ Custom Made. Creatively Crafted.✨</p>
    </div>

    <div class="product-grid">
      <div class="item">🎁 Made-to-order pieces for gifts</div>
      <div class="item">🏠 Home decor and accessories</div>
      <div class="item">⚙️ Custom 3D printed products</div>
    </div>

    <a href="https://skyscraftlab.store" class="cta-button">Visit Our Official Store</a>
  </main>
</body>
</html>
