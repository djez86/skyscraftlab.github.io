<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJ's Custom Prints</title>
  <style>
    /* Add this to your existing CSS section */
    .partner-section {
      text-align: center;
      padding: 20px;
      margin-top: 30px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .skys-logo-badge {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
      border: 3px solid #800080;
    }
    .partner-link {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background-color: #800080;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <main>
    <section class="partner-section">
      <img src="skyslogo.jpg" alt="Sky's Craft Lab Logo" class="skys-logo-badge">
      <h2>Sky's Craft Lab</h2>
      <p>Custom Made. Creatively Crafted.</p>
      <a href="https://skyscraftlab.store/" target="_blank" class="partner-link">Visit Her Store</a>
    </section>

  </main>

  </body>
</html>
